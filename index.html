<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕСТ ФОНУ</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #111;
            overflow: hidden;
        }
        .bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('back.png') center center / cover no-repeat #000;
            border: 8px solid limegreen;  /* товста зелена рамка для видимості */
            box-sizing: border-box;
            z-index: 1;
        }
        .overlay-text {
            position: relative;
            z-index: 10;
            color: white;
            font-size: 60px;
            text-align: center;
            padding-top: 40vh;
            text-shadow: 4px 4px 12px black;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay-text">Якщо бачиш зелений бордюр + картинку — фон працює</div>
</body>
</html>
