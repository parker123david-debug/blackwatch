<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>

    <!-- Шрифт Game of Thrones через CDN -->
    <link href="https://db.onlinewebfonts.com/c/97c4b25dc74e0ab045154e75a8fdd69d?family=Game+of+Thrones" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: white;
            /* НЕ ставимо background: black; — нехай фоновий div робить всю роботу */
        }
        .bg {
            position: fixed;
            inset: 0;
            background: url('back.png') center center / cover no-repeat !important;
            z-index: -1;
            /* Додаємо плавне завантаження */
            opacity: 0;
            transition: opacity 1.2s ease-in;
        }
        .bg.loaded {
            opacity: 1;
        }
        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 20px 0;
            /* Якщо фон не завантажився — робимо темний напівпрозорий шар */
            background: rgba(0,0,0,0.4); /* легкий затемнювач як запасний варіант */
        }
        .header {
            color: #d4af37;
            font-family: 'Game of Thrones', Georgia, serif;
            font-size: clamp(2.2rem, 6vw, 5rem);
            font-style: italic;
            text-shadow: 3px 3px 10px black;
            margin-top: 3vh;
            max-width: 95vw;
            line-height: 1.1;
        }
        .oath {
            color: #e0e0e0;
            font-family: 'Game of Thrones', Georgia, serif;
            font-size: clamp(1.8rem, 5.5vw, 4.5rem);
            font-weight: bold;
            line-height: 1.25;
            text-shadow: 2px 2px 12px black;
            max-width: 90vw;
            padding: 0 15px;
        }
        .bottom-block {
            margin-bottom: 4vh;
            width: 100%;
        }
        .label {
            font-size: clamp(1.4rem, 4vw, 3rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
            opacity: 0.95;
        }
        .timer {
            font-family: 'Times New Roman', serif;
            font-size: clamp(5rem, 18vw, 14rem);
            font-weight: bold;
            color: #a5f2f3;
            text-shadow: 0 0 40px rgba(165, 242, 243, 0.6);
            line-height: 0.9;
        }

        /* Адаптація для великих екранів */
        @media (min-width: 1400px) {
            .header  { font-size: clamp(2.2rem, 3.5vw, 4.2rem); }
            .oath    { font-size: clamp(1.8rem, 3vw, 3.8rem); }
            .timer   { font-size: clamp(5rem, 10vw, 11rem); }
            .label   { font-size: clamp(1.4rem, 2.5vw, 2.8rem); }
        }

        @media (max-width: 480px) {
            .timer   { font-size: clamp(3.5rem, 20vw, 8rem); }
            .header  { margin-top: 5vh; }
            .container { padding: 10px 0; }
        }
    </style>
</head>
<body>
    <div class="bg" id="bg"></div>
    <div class="container">
        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>
        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>
        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <!-- Аудіо -->
    <audio id="ambience" loop muted volume="0.35" autoplay>
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop muted volume="0.20" autoplay>
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Таймер
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText =
                (h < 10 ? "0" + h : h) + ":" +
                (m < 10 ? "0" + m : m) + ":" +
                (s < 10 ? "0" + s : s);
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Плавне показування фону після завантаження
        const bg = document.getElementById('bg');
        const bgImg = new Image();
        bgImg.src = 'back.png';
        bgImg.onload = function() {
            bg.classList.add('loaded');
        };
        // Якщо зображення вже в кеші — показуємо відразу
        if (bgImg.complete) {
            bg.classList.add('loaded');
        }

        // Аудіо логіка
        const ambience = document.getElementById('ambience');
        const theme = document.getElementById('theme');

        ambience.play().catch(() => console.log("Автоплей ambience заблоковано"));
        theme.play().catch(() => console.log("Автоплей theme заблоковано"));

        let audioUnlocked = false;
        function unlockAudio() {
            if (!audioUnlocked) {
                ambience.muted = false;
                theme.muted = false;
                audioUnlocked = true;
                if (ambience.paused) ambience.play().catch(() => {});
                if (theme.paused) theme.play().catch(() => {});
            }
        }

        ['click', 'touchstart', 'keydown', 'scroll', 'mousemove'].forEach(event => {
            document.addEventListener(event, unlockAudio, { once: true, passive: true });
        });
    </script>
</body>
</html>
