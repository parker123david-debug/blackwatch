<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>

    <!-- Надійний шрифт Cinzel (аналог Game of Thrones) з Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height:100%;
            width:100%;
            overflow:hidden;
            font-family:'Cinzel', Georgia, serif;
            color:#fff;
            background:#000; /* тільки якщо зображення взагалі не завантажиться */
        }

        .bg {
            position:fixed;
            inset:0;
            z-index:-1;
            background:url('./back.png') center center / cover no-repeat;
            background:url('/back.png') center center / cover no-repeat; /* запасний варіант для GitHub Pages */
        }

        .container {
            position:relative;
            z-index:1;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            align-items:center;
            text-align:center;
            padding:4vh 5vw;
        }

        .header {
            color:#d4af37;
            font-family:'Cinzel', serif;
            font-weight:900;
            font-size:clamp(2.4rem, 6.5vw, 4.5rem);
            text-shadow:3px 3px 12px #000;
            margin-top:2vh;
            max-width:92vw;
            line-height:1.12;
        }

        .oath {
            color:#e0e0e0;
            font-family:'Cinzel', serif;
            font-weight:700;
            font-size:clamp(1.8rem, 5.2vw, 3.8rem);
            line-height:1.3;
            text-shadow:2px 2px 10px #000;
            max-width:88vw;
        }

        .bottom-block {
            margin-bottom:6vh;
            width:100%;
        }

        .label {
            font-size:clamp(1.4rem, 4.2vw, 2.6rem);
            font-weight:bold;
            text-transform:uppercase;
            letter-spacing:4px;
            margin-bottom:6px;
            opacity:0.94;
        }

        .timer {
            font-family:'Times New Roman', serif;
            font-size:clamp(4.2rem, 16vw, 10.5rem);
            font-weight:bold;
            color:#a5f2f3;
            text-shadow:0 0 40px rgba(165,242,243,0.7);
            line-height:0.92;
        }

        /* Обмеження на великих екранах */
        @media (min-width: 1200px) {
            .header  { font-size:clamp(2.6rem, 3.8vw, 4.2rem); }
            .oath    { font-size:clamp(2rem, 3vw, 3.4rem); }
            .timer   { font-size:clamp(5.5rem, 8vw, 9rem); }
        }

        @media (max-width: 500px) {
            .timer   { font-size:clamp(3.8rem, 20vw, 8rem); }
            .container { padding:3vh 6vw; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div class="container">
        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>
        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>
        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <!-- Аудіо -->
    <audio id="ambience" loop preload="auto" volume="0.35">
        <source src="./wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop preload="auto" volume="0.20">
        <source src="./title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Таймер до 08:00
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText = 
                h.toString().padStart(2,'0') + ':' +
                m.toString().padStart(2,'0') + ':' +
                s.toString().padStart(2,'0');
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Звук: розблокування після першої взаємодії (обов'язково для десктопу)
        const ambience = document.getElementById('ambience');
        const theme    = document.getElementById('theme');
        let unlocked = false;

        function unlockAudio() {
            if (unlocked) return;
            unlocked = true;
            ambience.muted = false;
            theme.muted = false;
            ambience.play().catch(e => console.log("Ambience play error:", e));
            theme.play().catch(e => console.log("Theme play error:", e));
        }

        // Більше подій для надійності
        ['click', 'touchstart', 'keydown', 'mousemove', 'scroll', 'pointerdown'].forEach(ev => {
            document.addEventListener(ev, unlockAudio, { once: true, passive: true });
        });

        // Початкова спроба з muted (працює майже завжди)
        ambience.muted = true;
        theme.muted = true;
        ambience.play().catch(() => {});
        theme.play().catch(() => {});
    </script>
</body>
</html>
