<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ТЕСТ ФОНУ</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #000;
            overflow: hidden;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: url('back.png') no-repeat center center / contain;
            z-index: 1;
            border: 5px solid lime;          /* зелена рамка ТОВСТА для видимості */
            box-sizing: border-box;
        }

        .text {
            position: relative;
            z-index: 10;
            color: white;
            font-size: 40px;
            text-align: center;
            padding-top: 50vh;
            text-shadow: 3px 3px 10px black;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="text">Якщо бачиш цю зелёну рамку + картинку — фон працює</div>
</body>
</html>
