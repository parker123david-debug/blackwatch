<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: white;
            background: #000;
        }

        #snow-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;      /* не заважає клікам */
            z-index: 0;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: url('back.png') center center / cover no-repeat;
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 20px 0;
        }

        .header {
            color: #d4af37;
            font-size: clamp(2.2rem, 6vw, 5rem);
            font-style: italic;
            text-shadow: 3px 3px 10px black;
            margin-top: 3vh;
        }

        .oath {
            color: #e0e0e0;
            font-size: clamp(1.8rem, 5.5vw, 4.5rem);
            font-weight: bold;
            line-height: 1.25;
            text-shadow: 2px 2px 12px black;
        }

        .bottom-block {
            margin-bottom: 4vh;
            width: 100%;
        }

        .label {
            font-size: clamp(1.4rem, 4vw, 3rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
            opacity: 0.95;
        }

        .timer {
            font-family: 'Times New Roman', serif;
            font-size: clamp(5rem, 18vw, 18rem);
            font-weight: bold;
            color: #a5f2f3;
            text-shadow: 0 0 40px rgba(165, 242, 243, 0.6);
            line-height: 0.9;
        }

        #sound-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(20,20,40,0.65);
            color: #a5f2f3;
            border: 1px solid #a5f2f3;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1rem;
            z-index: 10;
        }

        #sound-toggle:hover {
            background: rgba(60,60,90,0.85);
        }
    </style>
</head>
<body>
    <canvas id="snow-canvas"></canvas>
    <div class="bg"></div>

    <div class="container">
        <button id="sound-toggle">Увімкнути звук Стіни</button>

        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>

        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>

        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <!-- Аудіо з muted для автоплею -->
    <audio id="ambience" loop muted volume="0.35">
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop muted volume="0.20">
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ────────────────────────────────────────────────
        // Таймер
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);

            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('countdown').innerText =
                (h < 10 ? "0" + h : h) + ":" +
                (m < 10 ? "0" + m : m) + ":" +
                (s < 10 ? "0" + s : s);
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // ────────────────────────────────────────────────
        // Автоплей + розблокування звуку після першого кліку
        const ambience = document.getElementById('ambience');
        const theme    = document.getElementById('theme');
        const btn      = document.getElementById('sound-toggle');

        // намагаємося автоплей з muted
        ambience.play().catch(() => console.log("Автоплей заблоковано (muted)"));
        theme.play().catch(() => console.log("Автоплей заблоковано (muted)"));

        // після будь-якого кліку розблокуємо звук повністю
        let unlocked = false;
        document.addEventListener('click', function unlockAudio() {
            if (!unlocked) {
                ambience.muted = false;
                theme.muted = false;
                unlocked = true;
                // можна навіть трохи збільшити гучність після розблокування
                // ambience.volume = 0.45;
                // theme.volume = 0.30;
            }
        }, { once: true });  // тільки перший клік

        // кнопка все одно працює (toggle)
        let isPlaying = true;  // бо автоплей
        btn.addEventListener('click', () => {
            if (isPlaying) {
                ambience.pause();
                theme.pause();
                btn.textContent = "Увімкнути звук Стіни";
            } else {
                ambience.play();
                theme.play();
                btn.textContent = "Вимкнути звук Стіни";
            }
            isPlaying = !isPlaying;
        });

        // ────────────────────────────────────────────────
        // Простий снігопад на canvas
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');

        let flakes = [];
        const flakeCount = 120;  // кількість сніжинок (можна зменшити до 60-80 для слабких пристроїв)

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // створюємо сніжинки
        for (let i = 0; i < flakeCount; i++) {
            flakes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 3 + 1,
                speed: Math.random() * 1.5 + 0.5,
                drift: Math.random() * 0.8 - 0.4   // легкий бічний рух
            });
        }

        function drawSnow() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.9)";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "rgba(255,255,255,0.6)";

            flakes.forEach(flake => {
                ctx.beginPath();
                ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                ctx.fill();

                flake.y += flake.speed;
                flake.x += flake.drift;

                // легкий коливання
                flake.drift += (Math.random() - 0.5) * 0.05;
                flake.drift = Math.max(-0.8, Math.min(0.8, flake.drift));

                // якщо впала вниз — повертаємо наверх
                if (flake.y > canvas.height) {
                    flake.y = -10;
                    flake.x = Math.random() * canvas.width;
                }

                // якщо вийшла за край по горизонталі
                if (flake.x > canvas.width) flake.x = 0;
                if (flake.x < 0) flake.x = canvas.width;
            });

            requestAnimationFrame(drawSnow);
        }

        drawSnow();
    </script>
</body>
</html>
