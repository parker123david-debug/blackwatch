<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>

    <!-- Шрифт Game of Thrones -->
    <link href="https://db.onlinewebfonts.com/c/97c4b25dc74e0ab045154e75a8fdd69d?family=Game+of+Thrones" rel="stylesheet">

    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height:100%;
            width:100%;
            overflow:hidden;
            font-family:'Georgia',serif;
            color:white;
            background:#000; /* чорний тільки якщо зображення не завантажиться */
        }
        .bg {
            position:fixed;
            inset:0;
            background:url('back.png') center center / cover no-repeat !important;
            z-index:-1;
        }
        .container {
            position:relative;
            z-index:1;
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:space-between;
            align-items:center;
            text-align:center;
            padding:3vh 5vw;
        }
        .header {
            color:#d4af37;
            font-family:'Game of Thrones',Georgia,serif;
            font-size:clamp(2.2rem,6vw,4.5rem);
            font-style:italic;
            text-shadow:3px 3px 12px #000;
            margin-top:2vh;
            max-width:92vw;
            line-height:1.1;
        }
        .oath {
            color:#e0e0e0;
            font-family:'Game of Thrones',Georgia,serif;
            font-size:clamp(1.7rem,5vw,3.8rem);
            line-height:1.3;
            text-shadow:2px 2px 10px #000;
            max-width:88vw;
        }
        .bottom-block {
            margin-bottom:6vh;
            width:100%;
        }
        .label {
            font-size:clamp(1.3rem,4vw,2.6rem);
            font-weight:bold;
            text-transform:uppercase;
            letter-spacing:4px;
            margin-bottom:6px;
            opacity:0.95;
        }
        .timer {
            font-family:'Times New Roman',serif;
            font-size:clamp(4rem,15vw,11rem);
            font-weight:bold;
            color:#a5f2f3;
            text-shadow:0 0 40px rgba(165,242,243,0.7);
            line-height:0.9;
        }

        /* Менше на великих екранах */
        @media (min-width:1200px) {
            .header  { font-size:clamp(2.4rem,3.5vw,4rem); }
            .oath    { font-size:clamp(1.8rem,2.8vw,3.4rem); }
            .timer   { font-size:clamp(5rem,8vw,9rem); }
        }

        @media (max-width:500px) {
            .timer   { font-size:clamp(3.5rem,20vw,7.5rem); }
            .container { padding:2vh 6vw; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>
        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>
        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <!-- Аудіо -->
    <audio id="ambience" loop preload="auto" volume="0.35">
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop preload="auto" volume="0.20">
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Таймер
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8,0,0,0);
            if (now >= target) target.setDate(target.getDate()+1);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000)/60000);
            const s = Math.floor((diff % 60000)/1000);
            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        setInterval(updateTimer,1000);
        updateTimer();

        // Аудіо — розблокування після взаємодії
        const ambience = document.getElementById('ambience');
        const theme = document.getElementById('theme');
        let unlocked = false;

        function unlock() {
            if (unlocked) return;
            unlocked = true;
            ambience.muted = false;
            theme.muted = false;
            ambience.play().catch(()=>{});
            theme.play().catch(()=>{});
        }

        ['click','touchstart','keydown','mousemove','scroll'].forEach(e=>{
            document.addEventListener(e, unlock, {once:true, passive:true});
        });

        // Початкова спроба muted
        ambience.muted = true; theme.muted = true;
        ambience.play().catch(()=>{});
        theme.play().catch(()=>{});
    </script>
</body>
</html>
