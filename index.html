<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>

    <!-- Підключення шрифту Game of Thrones через CDN (без завантаження файлів) -->
    <link href="https://db.onlinewebfonts.com/c/97c4b25dc74e0ab045154e75a8fdd69d?family=Game+of+Thrones" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: white;
            background: black; /* запасний фон на випадок затримки зображення */
        }
        .bg {
            position: fixed;
            inset: 0;
            background: url('back.png') center center / cover no-repeat;
            z-index: -1;
        }
        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 2vh 4vw;
        }
        .header {
            color: #d4af37;
            font-family: 'Game of Thrones', Georgia, serif;
            font-size: clamp(2rem, 6vw, 4.5rem);
            font-style: italic;
            text-shadow: 3px 3px 12px black;
            margin-top: 4vh;
            line-height: 1.15;
            max-width: 92vw;
            letter-spacing: 1px;
        }
        .oath {
            color: #e0e0e0;
            font-family: 'Game of Thrones', Georgia, serif;
            font-size: clamp(1.5rem, 5vw, 3.6rem);
            font-weight: normal;
            line-height: 1.3;
            text-shadow: 2px 2px 10px black;
            max-width: 88vw;
            padding: 0 5vw;
        }
        .bottom-block {
            margin-bottom: 5vh;
            width: 100%;
        }
        .label {
            font-size: clamp(1.2rem, 4vw, 2.8rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            opacity: 0.92;
        }
        .timer {
            font-family: 'Times New Roman', serif;
            font-size: clamp(3.5rem, 16vw, 11rem);
            font-weight: bold;
            color: #a5f2f3;
            text-shadow: 0 0 35px rgba(165, 242, 243, 0.65);
            line-height: 0.92;
        }

        /* Адаптація для різних екранів */
        @media (max-width: 480px) {   /* малі телефони (портрет) */
            .header { font-size: clamp(1.8rem, 9vw, 3.2rem); margin-top: 6vh; }
            .oath   { font-size: clamp(1.3rem, 7vw, 2.6rem); line-height: 1.35; }
            .timer  { font-size: clamp(3rem, 20vw, 7rem); }
            .label  { font-size: clamp(1rem, 5vw, 2rem); letter-spacing: 3px; }
        }

        @media (min-width: 481px) and (max-width: 768px) {   /* великі телефони / малі планшети */
            .header { font-size: clamp(2.2rem, 7vw, 4rem); }
            .oath   { font-size: clamp(1.6rem, 5.5vw, 3.2rem); }
            .timer  { font-size: clamp(4rem, 18vw, 9rem); }
        }

        @media (min-width: 1025px) and (max-width: 1440px) {   /* ноутбуки / середні монітори */
            .header { font-size: clamp(2.4rem, 4vw, 4.2rem); }
            .oath   { font-size: clamp(1.8rem, 3.2vw, 3.4rem); }
            .timer  { font-size: clamp(5rem, 10vw, 10rem); }
        }

        @media (min-width: 1441px) {   /* великі монітори / 4K */
            .header { font-size: clamp(2.6rem, 2.8vw, 4rem); max-width: 80vw; }
            .oath   { font-size: clamp(1.9rem, 2.4vw, 3.2rem); max-width: 75vw; }
            .timer  { font-size: clamp(6rem, 8vw, 9.5rem); }
            .label  { font-size: clamp(1.6rem, 2vw, 2.6rem); }
        }

        /* Дуже високі екрани (наприклад, вертикальні монітори) */
        @media (min-height: 1200px) {
            .container { padding: 4vh 6vw; }
            .header { margin-top: 8vh; }
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>
        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>
        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <!-- Аудіо -->
    <audio id="ambience" loop muted volume="0.35" autoplay>
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop muted volume="0.20" autoplay>
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Таймер до 08:00 наступного дня
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText =
                (h < 10 ? "0" + h : h) + ":" +
                (m < 10 ? "0" + m : m) + ":" +
                (s < 10 ? "0" + s : s);
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // Аудіо логіка (розблокування при взаємодії)
        const ambience = document.getElementById('ambience');
        const theme = document.getElementById('theme');

        ambience.play().catch(() => console.log("Автоплей ambience заблоковано"));
        theme.play().catch(() => console.log("Автоплей theme заблоковано"));

        let audioUnlocked = false;
        function unlockAudio() {
            if (!audioUnlocked) {
                ambience.muted = false;
                theme.muted = false;
                audioUnlocked = true;
                if (ambience.paused) ambience.play().catch(() => {});
                if (theme.paused) theme.play().catch(() => {});
            }
        }

        ['click', 'touchstart', 'keydown', 'mousemove', 'scroll'].forEach(event => {
            document.addEventListener(event, unlockAudio, { once: true, passive: true });
        });
    </script>
</body>
</html>
