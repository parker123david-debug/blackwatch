<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: black; color: white;
            font-family: 'Georgia', serif; overflow: hidden;
        }
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            /* ВИКОРИСТОВУЄМО ТВОЄ НОВЕ ПОСИЛАННЯ */
            background: url('https://github.com/parker123david-debug/blackwatch/blob/main/586332.jpg?raw=true') no-repeat center center;
            background-size: cover; z-index: -1;
        }
        .container {
            display: flex; flex-direction: column; height: 100vh;
            justify-content: space-between; align-items: center;
            text-align: center; background: rgba(0,0,0,0.3);
        }
        .header {
            color: #d4af37; font-size: 5vw; font-style: italic;
            margin-top: 5vh; text-shadow: 2px 2px 8px black;
            padding: 0 10px;
        }
        .oath {
            color: #bdc3c7; font-size: 6vw; font-weight: bold;
            text-shadow: 2px 2px 10px black;
            margin-top: -10vh;
        }
        .bottom-block { margin-bottom: 5vh; width: 100%; }
        .label {
            color: #ecf0f1; font-size: 4vw; font-weight: bold;
            margin-bottom: 5px; text-transform: uppercase;
        }
        .timer {
            color: #a5f2f3; font-size: 16vw; font-weight: bold;
            font-family: 'Times New Roman', serif;
            text-shadow: 0 0 20px rgba(165, 242, 243, 0.8);
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>
        <div class="oath">Я — меч у темряві.<br>Я — вартовий на Стіні.</div>
        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('countdown').innerText = 
                `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
