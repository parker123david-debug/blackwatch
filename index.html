<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Georgia', serif;
            color: white;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: url('back.png') center center / cover no-repeat !important;
            z-index: -1;
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            padding: 20px 0;
        }

        .header {
            color: #d4af37;
            font-size: clamp(2.2rem, 6vw, 5rem);
            font-style: italic;
            text-shadow: 3px 3px 10px black;
            margin-top: 3vh;
        }

        .oath {
            color: #e0e0e0;
            font-size: clamp(1.8rem, 5.5vw, 4.5rem);
            font-weight: bold;
            line-height: 1.25;
            text-shadow: 2px 2px 12px black;
        }

        .bottom-block {
            margin-bottom: 4vh;
            width: 100%;
        }

        .label {
            font-size: clamp(1.4rem, 4vw, 3rem);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 8px;
            opacity: 0.95;
        }

        .timer {
            font-family: 'Times New Roman', serif;
            font-size: clamp(5rem, 18vw, 18rem);
            font-weight: bold;
            color: #a5f2f3;
            text-shadow: 0 0 40px rgba(165, 242, 243, 0.6);
            line-height: 0.9;
        }
    </style>
</head>
<body>
    <div class="bg"></div>

    <div class="container">
        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>

        <div class="oath">
            Я — меч у темряві.<br>
            Я — вартовий на Стіні.
        </div>

        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <!-- Аудіо з muted для автозапуску -->
    <audio id="ambience" loop muted volume="0.35" autoplay>
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop muted volume="0.20" autoplay>
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Таймер
        function updateTimer() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);

            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);

            document.getElementById('countdown').innerText =
                (h < 10 ? "0" + h : h) + ":" +
                (m < 10 ? "0" + m : m) + ":" +
                (s < 10 ? "0" + s : s);
        }
        setInterval(updateTimer, 1000);
        updateTimer();


        // Аудіо логіка
        const ambience = document.getElementById('ambience');
        const theme    = document.getElementById('theme');

        // намагаємося запустити одразу (muted дозволить автоплей в більшості браузерів)
        ambience.play().catch(() => console.log("Автоплей ambience заблоковано"));
        theme.play().catch(() => console.log("Автоплей theme заблоковано"));

        // Розблокування звуку при першій взаємодії користувача
        let audioUnlocked = false;

        function unlockAudio() {
            if (!audioUnlocked) {
                ambience.muted = false;
                theme.muted = false;
                audioUnlocked = true;
                // повторно запускаємо, якщо були на паузі
                if (ambience.paused) ambience.play().catch(() => {});
                if (theme.paused)    theme.play().catch(() => {});
            }
        }

        // Слухаємо будь-яку взаємодію (клік, тач, скрол тощо)
        ['click', 'touchstart', 'keydown', 'scroll'].forEach(event => {
            document.addEventListener(event, unlockAudio, { once: true, passive: true });
        });
    </script>
</body>
</html>
