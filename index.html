<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ВАРТА НА СТІНІ</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: black; color: white;
            font-family: 'Georgia', serif; overflow: hidden;
        }
        .bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://raw.githubusercontent.com/parker123david-debug/blackwatch/refs/heads/main/back.png') no-repeat center center;
            background-size: cover; z-index: -1;
        }
        .container {
            display: flex; flex-direction: column; height: 100vh;
            justify-content: space-between; align-items: center;
            text-align: center; background: rgba(0,0,0,0.45);
            position: relative;
        }
        .header {
            color: #d4af37; font-size: 5vw; font-style: italic;
            margin-top: 5vh; text-shadow: 2px 2px 5px black;
            padding: 0 10px;
        }
        .oath {
            color: #bdc3c7; font-size: 5.5vw; font-weight: bold;
            text-shadow: 2px 2px 6px black;
            margin-top: -8vh; line-height: 1.2;
        }
        .bottom-block { margin-bottom: 5vh; width: 100%; }
        .label {
            color: #ecf0f1; font-size: 4vw; font-weight: bold;
            margin-bottom: 5px; text-transform: uppercase;
            letter-spacing: 2px;
        }
        .timer {
            color: #a5f2f3; font-size: 14vw; font-weight: bold;
            font-family: 'Times New Roman', serif;
            text-shadow: 0 0 30px rgba(165, 242, 243, 0.7);
        }

        /* кнопка для звуку */
        #sound-toggle {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(30,30,50,0.7);
            color: #a5f2f3;
            border: 1px solid #a5f2f3;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: Georgia, serif;
            z-index: 10;
        }
        #sound-toggle:hover { background: rgba(80,80,100,0.9); }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="container">
        <button id="sound-toggle">Увімкнути звук Стіни</button>

        <div class="header">НІЧ ПОЧИНАЄТЬСЯ, І ПОЧИНАЄТЬСЯ МОЯ ВАРТА...</div>
        <div class="oath">Я — меч у темряві.<br>Я — вартовий на Стіні.</div>
        <div class="bottom-block">
            <div class="label">ДО КІНЦЯ ВАРТИ</div>
            <div id="countdown" class="timer">00:00:00</div>
        </div>
    </div>

    <!-- Аудіо – завантаж ці файли в корінь репозиторію -->
    <audio id="ambience" loop volume="0.35">
        <source src="wind.mp3" type="audio/mpeg">
    </audio>
    <audio id="theme" loop volume="0.20">
        <source src="title.mp3" type="audio/mpeg">
    </audio>

    <script>
        // відлік часу
        function update() {
            const now = new Date();
            let target = new Date();
            target.setHours(8, 0, 0, 0);
            if (now >= target) target.setDate(target.getDate() + 1);
            
            const diff = target - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('countdown').innerText = 
                (h < 10 ? "0" + h : h) + ":" +
                (m < 10 ? "0" + m : m) + ":" +
                (s < 10 ? "0" + s : s);
        }
        setInterval(update, 1000);
        update();

        // логіка звуку
        const ambience = document.getElementById('ambience');
        const theme    = document.getElementById('theme');
        const btn      = document.getElementById('sound-toggle');

        let isPlaying = false;

        btn.addEventListener('click', () => {
            if (!isPlaying) {
                ambience.play().catch(e => console.log("Автозапуск заблоковано", e));
                theme.play().catch(e => console.log("Автозапуск заблоковано", e));
                btn.textContent = "Вимкнути звук Стіни";
                isPlaying = true;
            } else {
                ambience.pause();
                theme.pause();
                btn.textContent = "Увімкнути звук Стіни";
                isPlaying = false;
            }
        });
    </script>
</body>
</html>
